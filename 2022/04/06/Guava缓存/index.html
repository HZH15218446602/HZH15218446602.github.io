"line"><span class="meta">@Component</span></span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">BaseCache</span> &#123;</span><br><span class="line">    <span class="comment">//2.写成员变量</span></span><br><span class="line">    <span class="keyword">private</span> Cache&lt;String,Object&gt; tenMinuteCache = CacheBuilder.newBuilder()<span class="comment">//3.新建缓存</span></span><br><span class="line"></span><br><span class="line">            <span class="comment">//4.设置缓存初始大小，应该合理设置，后续会扩容</span></span><br><span class="line">            .initialCapacity(<span class="number">10</span>)</span><br><span class="line">            <span class="comment">//5.缓存最大值</span></span><br><span class="line">            .maximumSize(<span class="number">100</span>)</span><br><span class="line">            <span class="comment">//6.缓存可以被多少个线程使用</span></span><br><span class="line">            .concurrencyLevel(<span class="number">5</span>)</span><br><span class="line"></span><br><span class="line">            <span class="comment">//7.缓存过期时间，写入后10分钟过期</span></span><br><span class="line">            .expireAfterWrite(<span class="number">600</span>,TimeUnit.SECONDS)</span><br><span class="line"></span><br><span class="line">            <span class="comment">//8.统计缓存命中率</span></span><br><span class="line">            .recordStats()</span><br><span class="line">            <span class="comment">//9.构建缓存</span></span><br><span class="line">            .build();</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    <span class="keyword">private</span> Cache&lt;String,Object&gt; oneHourCache = CacheBuilder.newBuilder()</span><br><span class="line"></span><br><span class="line">            <span class="comment">//设置缓存初始大小，应该合理设置，后续会扩容</span></span><br><span class="line">            .initialCapacity(<span class="number">30</span>)</span><br><span class="line">            <span class="comment">//最大值</span></span><br><span class="line">            .maximumSize(<span class="number">100</span>)</span><br><span class="line">            <span class="comment">//并发数设置</span></span><br><span class="line">            .concurrencyLevel(<span class="number">5</span>)</span><br><span class="line"></span><br><span class="line">            <span class="comment">//缓存过期时间，写入后1小时 过期</span></span><br><span class="line">            .expireAfterWrite(<span class="number">3600</span>,TimeUnit.SECONDS)</span><br><span class="line"></span><br><span class="line">            <span class="comment">//统计缓存命中率</span></span><br><span class="line">            .recordStats()</span><br><span class="line"></span><br><span class="line">            .build();</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> Cache&lt;String, Object&gt; <span class="title function_">getOneHourCache</span><span class="params">()</span> &#123;</span><br><span class="line">        <span class="keyword">return</span> oneHourCache;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">void</span> <span class="title function_">setOneHourCache</span><span class="params">(Cache&lt;String, Object&gt; oneHourCache)</span> &#123;</span><br><span class="line">        <span class="built_in">this</span>.oneHourCache = oneHourCache;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> Cache&lt;String, Object&gt; <span class="title function_">getTenMinuteCache</span><span class="params">()</span> &#123;</span><br><span class="line">        <span class="keyword">return</span> tenMinuteCache;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">void</span> <span class="title function_">setTenMinuteCache</span><span class="params">(Cache&lt;String, Object&gt; tenMinuteCache)</span> &#123;</span><br><span class="line">        <span class="built_in">this</span>.tenMinuteCache = tenMinuteCache;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//10.建立缓存的key</span></span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">CacheKeyManager</span> &#123;</span><br><span class="line"></span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * 首页轮播图缓存key</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> <span class="type">String</span> <span class="variable">INDEX_BANNER_KEY</span> <span class="operator">=</span> <span class="string">&quot;index:banner:list&quot;</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * 首页视频列表缓存key</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> <span class="type">String</span> <span class="variable">INDEX_VIDEL_LIST</span> <span class="operator">=</span> <span class="string">&quot;index:video:list&quot;</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * 视频详情缓存key, %s是视频id</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> <span class="type">String</span> <span class="variable">VIDEO_DETAIL</span> <span class="operator">=</span> <span class="string">&quot;video:detail:%s&quot;</span>;</span><br><span class="line"></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
